<!DOCTYPE html>
<html>

<head>
<title>Register | UIMS</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'DM Sans',sans-serif;
}

body{
height:100vh;
display:flex;
background:#030712;
overflow:hidden;
color:white;
}

/* LEFT PANEL */

.left{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:60px;
background:linear-gradient(135deg,#020617,#0f172a);
position:relative;
overflow:hidden;
}

.left::before{
content:"";
position:absolute;
width:500px;
height:500px;
background:#06d6a0;
filter:blur(120px);
opacity:0.15;
top:-100px;
right:-100px;
animation:float 6s infinite ease-in-out;
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-40px)}
}

.left h1{
font-size:48px;
font-family:'Syne',sans-serif;
font-weight:800;
margin-bottom:10px;
background:linear-gradient(90deg,#00f5ff,#06d6a0);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.left p{
color:#94a3b8;
margin-bottom:40px;
text-align:center;
max-width:320px;
}

.step{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
padding:14px 18px;
border-radius:12px;
margin-bottom:12px;
width:260px;
transition:0.3s;
}

.step:hover{
transform:translateX(6px);
background:rgba(255,255,255,0.1);
}

/* RIGHT SIDE */

.right{
flex:1;
display:flex;
justify-content:center;
align-items:center;
background:#020617;
}

/* REGISTER CARD */

.container{
width:400px;
max-height:90vh;
overflow-y:auto;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
padding:40px;
border-radius:20px;
box-shadow:0 0 40px rgba(0,0,0,0.5);
animation:fadeUp 0.8s ease;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(30px)}
to{opacity:1;transform:translateY(0)}
}

h2{
text-align:center;
margin-bottom:25px;
font-family:'Syne',sans-serif;
font-weight:700;
}

/* INPUTS */

.input-group{
margin-bottom:18px;
}

label{
font-size:13px;
color:#94a3b8;
}

input,select{
width:100%;
padding:14px;
margin-top:6px;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.08);
color:white;
}

input:focus,select:focus{
outline:none;
box-shadow:0 0 12px #06d6a0;
}

/* BUTTON */

button{
width:100%;
padding:14px;
background:linear-gradient(135deg,#06d6a0,#3b82f6);
border:none;
border-radius:10px;
color:white;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 0 20px rgba(6,214,160,0.5);
}

/* LINK */

.link{
text-align:center;
margin-top:18px;
font-size:14px;
color:#94a3b8;
}

.link a{
color:#06d6a0;
text-decoration:none;
font-weight:500;
}

.link a:hover{
text-decoration:underline;
}

/* SCROLL */

.container::-webkit-scrollbar{
width:6px;
}
.container::-webkit-scrollbar-thumb{
background:#06d6a0;
border-radius:10px;
}

</style>
</head>

<body>

<!-- LEFT -->

<div class="left">

<h1>UIMS</h1>

<p>Unified Internship & Live Project Management System</p>

<div class="step">✨ Create Account</div>
<div class="step">🔐 Login Securely</div>
<div class="step">📊 Track Progress</div>
<div class="step">🚀 Complete Internship</div>

</div>

<!-- RIGHT -->

<div class="right">

<div class="container">

<h2>Create Account</h2>

<form method="POST" action="/register">

<div class="input-group">
<label>Full Name</label>
<input type="text" name="full_name" placeholder="Enter your full name" required>
</div>

<div class="input-group">
<label>Email</label>
<input type="email" name="email" placeholder="Enter your email" required>
</div>

<div class="input-group">
<label>Password</label>
<input type="password" name="password" placeholder="Create a password" required>
</div>

<div class="input-group">
<label>Select Role</label>

<select name="role">
<option value="student">Student</option>
<option value="guide">Guide</option>
<option value="company">Company</option>
</select>

</div>

<button type="submit">Create Account</button>

</form>

<div class="link">
<a href="/login">Already have an account? Login</a>
</div>

</div>

</div>

</body>
</html>
