<!DOCTYPE html>
<html>
<head>
<title>UIMS</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'DM Sans',sans-serif;
}

/* BODY */
body{
background:#030712;
color:white;
display:flex;
}

/* SIDEBAR */

.sidebar{
width:240px;
height:100vh;
background:linear-gradient(180deg,#020617,#0f172a);
padding:25px;
position:fixed;
}

.logo{
font-family:'Syne',sans-serif;
font-size:26px;
font-weight:800;
margin-bottom:40px;
background:linear-gradient(90deg,#00f5ff,#06d6a0);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* MENU */

.menu a{
display:block;
padding:12px;
margin-bottom:10px;
border-radius:10px;
color:#94a3b8;
text-decoration:none;
transition:0.3s;
}

.menu a:hover{
background:rgba(255,255,255,0.08);
color:white;
transform:translateX(5px);
}

/* CONTENT */

.content{
margin-left:260px;
padding:30px;
width:100%;
}

/* CARD */

.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
padding:25px;
border-radius:16px;
backdrop-filter:blur(20px);
box-shadow:0 0 30px rgba(0,0,0,0.4);
animation:fadeUp 0.6s ease;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

/* BUTTON */

.btn{
padding:12px 18px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#06d6a0,#3b82f6);
color:white;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
transform:translateY(-2px);
box-shadow:0 0 20px rgba(6,214,160,0.5);
}

/* INPUT */

input,textarea{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:15px;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.08);
color:white;
}

input:focus,textarea:focus{
outline:none;
box-shadow:0 0 12px #06d6a0;
}

</style>

</head>

<body>

<div class="sidebar">
<div class="logo">UIMS</div>

<div class="menu">
<a href="/dashboard">Dashboard</a>
<a href="/proposal">Proposal</a>
<a href="/progress">Progress</a>
<a href="/status">Status</a>
<a href="/feedback">Feedback</a>
</div>
</div>

<div class="content">
{% block content %}{% endblock %}
</div>

</body>
</html>
